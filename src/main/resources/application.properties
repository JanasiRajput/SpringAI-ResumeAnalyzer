spring.application.name=Resumeanalyzer_SpringAI-1

# Gemini API Configuration
spring.ai.google.genai.api-key=google.api.key=YOUR_KEY_HERE
spring.ai.google.genai.chat.options.model=gemini-flash-latest
spring.ai.google.genai.chat.options.temperature=0.1

# Network Timeouts (Increased for complex analysis)
spring.mvc.async.request-timeout=60000
server.connection-timeout=60000
# Debugging Logs (Student Demo & Troubleshooting)
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.ai.google.genai=DEBUG
logging.level.org.springframework.retry=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.org.springframework.http=DEBUG
logging.level.org.apache.http=DEBUG
logging.level.org.apache.http.wire=DEBUG
